name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  syntax:
    name: Validación de sintaxis (Python + JS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Compilar Python (server.py, get-token.py)
        run: python -m py_compile server.py get-token.py

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Comprobar sintaxis de los módulos JS
        run: |
          for f in app.core.js app.boot.js app.vacaciones.js app.misc.js app.fichajes.js; do
            node --check "$f"
          done
